services:
  vote:
    image: ${VOTE_IMAGE:-ghcr.io/roxsross/roxs-devops-project90-vote:production}
    ports:
      - "80:80"
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/roxsross/roxs-devops-project90-worker:production}
    restart: unless-stopped

  result:
    image: ${RESULT_IMAGE:-ghcr.io/roxsross/roxs-devops-project90-result:production}
    ports:
      - "3000:3000"
    restart: unless-stopped

  redis:
    restart: unless-stopped

  database:
    restart: unless-stopped
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

volumes:
  pgdata_prod: