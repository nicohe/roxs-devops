apiVersion: v1
kind: ConfigMap
metadata:
  name: voting-app-config
  namespace: voting-app
  labels:
    app: voting-app
data:
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "votes"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: voting-app
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres123"
